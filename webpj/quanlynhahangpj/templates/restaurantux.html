<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giao Diện Quản Trị Nhà Hàng</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; }
        .header { background: #2c3e50; color: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h3 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { padding: 10px 20px; background: #ffaa00; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-submit:hover { background: #e09600; }
        .btn-logout { color: white; text-decoration: none; font-weight: bold; border: 1px solid white; padding: 8px 15px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Hệ Thống Quản Lý Menu & Vận Hành Nhà Hàng 🏪</h2>
        <a href="/logout" class="btn-logout">Đăng xuất hệ thống</a>
    </div>

    <div class="grid-container">
        <div class="card">
            <h3>➕ Thêm Món Vào Menu Online</h3>
            <form>
                <div class="form-group">
                    <label>Tên món ăn</label>
                    <input type="text" placeholder="Ví dụ: Phở bò tái lăn">
                </div>
                <div class="form-group">
                    <label>Giá tiền (đ)</label>
                    <input type="number" placeholder="Ví dụ: 45000">
                </div>
                <div class="form-group">
                    <label>Hình ảnh món ăn</label>
                    <input type="file">
                </div>
                <button type="button" class="btn-submit">Cập nhật lên Menu</button>
            </form>
        </div>

        <div class="card">
            <h3>👥 Quản Lý Thông Tin Nhân Viên</h3>
            <p style="color: #777; font-size: 0.95rem;">Danh sách nhân sự hiện tại của quán...</p>
            <button type="button" class="btn-submit" style="background:#2c3e50;">Thêm nhân viên mới</button>
            
            <h3 style="margin-top: 30px;">💬 Phản hồi đánh giá của khách</h3>
            <p style="color: #999; font-style: italic;">Chưa có nhận xét mới nào cần trả lời.</p>
        </div>
    </div>

</body>
</html>
