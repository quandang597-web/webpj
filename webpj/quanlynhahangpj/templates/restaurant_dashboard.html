<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang Quản Trị Nhà Hàng</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .sidebar {
        background-color: #343a40;
        min-height: 100vh;
        color: white;
      }
      .sidebar a {
        color: #c2c7d0;
        text-decoration: none;
        padding: 10px 15px;
        display: block;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background-color: #495057;
        color: white;
        border-radius: 4px;
      }
      .card-img-top-custom {
        width: 100%;
        height: 180px;
        object-fit: cover;
      }
      .avatar-staff {
        width: 60px;
        height: 60px;
        object-fit: cover;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-md-2 sidebar p-3 d-flex flex-column">
          <h4 class="text-center py-3 text-warning">Restaurant Admin</h4>
          <hr class="text-secondary" />
          <div
            class="nav flex-column nav-pills"
            id="v-pills-tab"
            role="tablist"
            aria-orientation="vertical"
          >
            <a
              class="nav-link active"
              id="menu-tab"
              data-bs-toggle="pill"
              href="#pane-menu"
              role="tab"
              >Quản lý Món ăn</a
            >
            <a
              class="nav-link"
              id="staff-tab"
              data-bs-toggle="pill"
              href="#pane-staff"
              role="tab"
              >Quản lý Nhân sự</a
            >
            <a
              class="nav-link"
              id="cert-tab"
              data-bs-toggle="pill"
              href="#pane-cert"
              role="tab"
              >Chứng chỉ & Thành tích</a
            >
            <a
              class="nav-link"
              id="review-tab"
              data-bs-toggle="pill"
              href="#pane-review"
              role="tab"
              >Đánh giá & Phản hồi</a
            >
          </div>
          <hr class="text-secondary mt-auto" />
          <a href="/logout" class="btn btn-danger btn-sm text-white text-center"
            >Đăng xuất</a
          >
        </div>

        <div class="col-md-10 p-4">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Bảng Điều Khiển Quản Trị</h2>
            <span class="badge bg-secondary p-2">Quyền: Chủ Nhà Hàng</span>
          </div>

          <div class="tab-content" id="v-pills-tabContent">
            <div
              class="tab-pane fade show active"
              id="pane-menu"
              role="tabpanel"
            >
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h3>Danh sách món ăn</h3>
                <button
                  class="btn btn-primary btn-sm"
                  data-bs-toggle="modal"
                  data-bs-target="#modalAddFood"
                >
                  + Thêm món ăn mới
                </button>
              </div>

              <div class="row row-cols-1 row-cols-md-4 g-4">
                {% for item in foods %}
                <div class="col">
                  <div class="card h-100 shadow-sm">
                    <img
                      src="/static/food/{{ item.image }}"
                      class="card-img-top card-img-top-custom"
                      alt="{{ item.name }}"
                    />
                    <div class="card-body">
                      <h5 class="card-title text-truncate">{{ item.name }}</h5>
                      <p class="card-text text-danger fw-bold">
                        {{ "{:,}".format(item.price) }} đ
                      </p>
                      <p class="card-text text-muted text-truncate small">
                        {{ item.description }}
                      </p>
                    </div>
                    <div class="card-footer bg-white border-top-0 d-flex gap-2">
                      <button
                        class="btn btn-outline-warning btn-sm w-50"
                        data-bs-toggle="modal"
                        data-bs-target="#modalEditFood{{ item.id }}"
                      >
                        Sửa
                      </button>
                      <form
                        action="/restaurant/food/delete/{{ item.id }}"
                        method="POST"
                        class="w-50"
                        onsubmit="
                          return confirm('Bạn chắc chắn muốn xóa món này?');
                        "
                      >
                        <button
                          type="submit"
                          class="btn btn-outline-danger btn-sm w-100"
                        >
                          Xóa
                        </button>
                      </form>
                    </div>
                  </div>
                </div>
                {% endfor %}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
