<!doctype html>
<html>
  <head>
    <title>Giỏ Hàng</title>

    <style>
      table {
        width: 90%;
        margin: auto;
        border-collapse: collapse;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: center;
      }

      .total {
        font-size: 30px;
        color: red;
        text-align: center;
        margin-top: 20px;
      }

      .btn {
        padding: 10px 20px;
        background: #ff5e36;
        color: white;
        text-decoration: none;
        border-radius: 5px;
      }
    </style>
  </head>

  <body>
    <h1 align="center">🛒 Giỏ Hàng</h1>

    <table>
      <tr>
        <th>Món</th>

        <th>Giá</th>

        <th>Số lượng</th>

        <th>Thành tiền</th>

        <th>Xóa</th>
      </tr>

      {% for item in items %}

      <tr>
        <td>{{ item.food.name }}</td>

        <td>{{ item.food.price }}</td>

        <td>{{ item.quantity }}</td>

        <td>{{ item.subtotal }}</td>

        <td>
          <a href="/remove-cart/{{ loop.index0 }}"> ❌ </a>
        </td>
      </tr>

      {% endfor %}
    </table>

    <div class="total">Tổng tiền: {{ total }} VNĐ</div>

    <br />

    <div align="center">
      <a class="btn" href="/checkout"> 💳 Thanh Toán </a>
    </div>
  </body>
</html>
