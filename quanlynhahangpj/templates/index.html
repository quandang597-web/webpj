<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuOnline - Kết Nối Nhà Hàng & Khách Hàng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.95);
            max-width: 1100px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            display: flex;
            overflow: hidden;
        }

        /* 1. Phần bên trái: Giới thiệu + Hình ảnh (Sặc sỡ) */
        .info-side {
            flex: 1.2;
            background: linear-gradient(135deg, #ff5e36 0%, #ffaa00 100%);
            color: white;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .info-side h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .info-side p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.95;
        }

        /* Khung chứa ảnh minh họa ẩm thực */
        .image-container {
            width: 100%;
            height: 250px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 2. Phần bên phải: Form Đăng nhập / Đăng ký kiểu bình thường */
        .auth-side {
            flex: 1;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-side h2 {
            font-size: 2rem;
            color: #ff5e36;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        /* Style cho các ô nhập liệu */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #ff5e36;
            outline: none;
            box-shadow: 0 0 8px rgba(255, 94, 54, 0.2);
        }

        /* Các nút bấm hành động */
        .btn-box {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
        }

        .btn-login {
            background: #ff5e36;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 94, 54, 0.3);
        }

        .btn-login:hover {
            background: #e04f2a;
            transform: translateY(-2px);
        }

        .btn-register {
            background: #ffaa00;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 170, 0, 0.3);
        }

        .btn-register:hover {
            background: #e09600;
            transform: translateY(-2px);
        }

        /* Giao diện trên điện thoại */
        @media (max-width: 850px) {
            .main-card {
                flex-direction: column;
            }
            .info-side, .auth-side {
                padding: 30px;
            }
            .image-container {
                height: 180px;
            }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <!-- BÊN TRÁI: GIỚI THIỆU SẶC SỠ + ẢNH TRỰC QUAN -->
        <div class="info-side">
            <div>
                <h1>MenuOnline 🌟</h1>
                <p>Nền tảng bùng nổ giúp kết nối siêu tốc giữa các nhà hàng và khách hàng. Quản lý, cập nhật menu online một cách hiệu quả, nhanh chóng và chuyên nghiệp chỉ trong vài cú click!</p>
            </div>
            
            <!-- Ảnh minh họa nhà hàng/món ăn (Lấy ảnh chất lượng cao tự động từ Unsplash) -->
            <div class="image-container">
                <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=800&q=80" alt="Restaurant and Menu">
            </div>
        </div>

        <!-- BÊN PHẢI: FORM ĐĂNG NHẬP / ĐĂNG KÝ TRUYỀN THỐNG -->
        <div class="auth-side">
            <h2>Chào Mừng Bạn!</h2>
            <p class="subtitle">Vui lòng điền thông tin tài khoản để truy cập hệ thống</p>
            
            <form action="#" method="POST">
                <!-- Ô Nhập Tài Khoản -->
                <div class="input-group">
                    <label for="username">Tên đăng nhập hoặc Email</label>
                    <input type="text" id="username" placeholder="Nhập tài khoản của bạn..." required>
                </div>

                <!-- Ô Nhập Mật Khẩu -->
                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu..." required>
                </div>

                <!-- Bộ đôi nút Đăng nhập & Đăng ký xếp ngang cạnh nhau công bằng -->
                <div class="btn-box">
                    <button type="submit" class="btn btn-login">Đăng Nhập</button>
                    <a href="/register" class="btn btn-register">Đăng Ký</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
