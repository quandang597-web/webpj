<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuOnline - Kết Nối & Quản Lý</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; scroll-behavior: smooth; }
        body { background-color: #fcfbf7; color: #333; }
        header { background: linear-gradient(135deg, #ff5e36 0%, #ffaa00 100%); padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo { font-size: 1.8rem; font-weight: bold; color: white; text-decoration: none; }
        .contact-mini { color: rgba(255, 255, 255, 0.9); font-size: 0.9rem; }
        
        .main-container { display: flex; max-width: 1200px; margin: 40px auto; padding: 0 20px; gap: 40px; align-items: center; }
        .info-side { flex: 1.2; }
        .info-side h1 { font-size: 3rem; color: #ff5e36; margin-bottom: 20px; font-weight: 800; }
        .info-side p { font-size: 1.2rem; line-height: 1.6; margin-bottom: 30px; }
        .image-box { width: 100%; height: 250px; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .auth-side { flex: 1; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 5px solid #ff5e36; }
        .auth-side h2 { font-size: 1.8rem; margin-bottom: 20px; color: #333; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .input-group input:focus { border-color: #ff5e36; outline: none; }
        
        .btn-box { display: flex; gap: 15px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; font-size: 1rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-align: center; text-decoration: none; transition: all 0.2s; }
        .btn-login { background: #ff5e36; color: white; }
        .btn-login:hover { background: #e04f2a; }
        .btn-register { background: #ffaa00; color: white; }
        .btn-register:hover { background: #e09600; }
        
        @media (max-width: 850px) { .main-container { flex-direction: column; } }
    </style>
</head>
<body>

    <header>
        <div>
            <a href="#" class="logo">MenuOnline 🚀</a>
            <div class="contact-mini">Hotline: 1900 1234 | Email: hotro@menuonline.vn</div>
        </div>
    </header>

    <div class="main-container">
        <div class="info-side">
            <h1>Kết Nối Ẩm Thực Thông Minh</h1>
            <p>Hệ thống chuyển đổi số menu mạnh mẽ dành cho nhà hàng và quản lý, tính toán hóa đơn, đặt món nhanh chóng cho khách hàng.</p>
            <div class="image-box">
                <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=800&q=80" alt="Restaurant">
            </div>
        </div>

        <div class="auth-side">
            <h2>Đăng Nhập</h2>
            <form action="/login" method="POST">
                <div class="input-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" name="username" placeholder="Nhập tài khoản..." required>
                </div>
                <div class="input-group">
                    <label>Mật khẩu</label>
                    <input type="password" name="password" placeholder="Nhập mật khẩu..." required>
                </div>
                <div class="btn-box">
                    <button type="submit" class="btn btn-login">Đăng Nhập</button>
                    <a href="/register" class="btn btn-register">Đăng Ký</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
