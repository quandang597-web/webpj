<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Giao Diện Khách Hàng - MenuOnline</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f7f9fc;
      }
      .header {
        background: #ff5e36;
        color: white;
        padding: 20px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .main-content {
        margin-top: 30px;
        display: flex;
        gap: 20px;
      }
      .menu-section {
        flex: 2;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }
      .cart-section {
        flex: 1;
        background: #fff3e0;
        padding: 20px;
        border-radius: 10px;
        border: 2px dashed #ffaa00;
      }
      .btn-logout {
        color: white;
        text-decoration: none;
        font-weight: bold;
        border: 1px solid white;
        padding: 8px 15px;
        border-radius: 5px;
      }
      .btn-logout:hover {
        background: white;
        color: #ff5e36;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>Chào mừng bạn đến với Không Gian Ẩm Thực! 🥞</h2>
      <a href="/logout" class="btn-logout">Đăng xuất</a>
    </div>

    <div class="main-content">
      <div class="menu-section">
        <h3>Danh sách món ăn của Nhà hàng</h3>

        <a
          href="/customer/menu"
          style="
            display: inline-block;
            padding: 12px 20px;
            background: #ff5e36;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 10px;
          "
        >
          🍜 Xem Menu Nhà Hàng
        </a>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee" />
        <h3>Góp ý & Đánh giá dịch vụ</h3>
        <textarea
          placeholder="Nhập ý kiến của bạn về món ăn tại đây..."
          style="
            width: 100%;
            height: 80px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
          "
        ></textarea>
        <button
          style="
            margin-top: 10px;
            padding: 10px 20px;
            background: #ff5e36;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
          "
        >
          Gửi nhận xét
        </button>
      </div>

      <div class="cart-section">
        <h3>🛒 Đơn hàng của bạn</h3>
        <p>Món đã chọn: 0 món</p>
        <p><b>Tổng tính toán: 0 đ</b></p>
        <button
          style="
            width: 100%;
            padding: 12px;
            background: #42b72a;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
          "
        >
          Đặt món ngay
        </button>
      </div>
    </div>
  </body>
</html>
